# =============================================
# AutoCVE V1.0.0 йҗўзҶ¶йӘҮйҗңоҲҡо•Ёж¶“вӮ¬й–ҝоҮҖе„ҙзјғжҹҘеҺӨзјғ?
# =============================================
# жөЈи·Ёж•ӨжЈ°еӢ¬зҖҜеҜӨиҷ№ж®‘ GHCR й—Җж»ғе„ҡй”ӣеұҫжЈӨй—ҮвӮ¬йҸҲо„Җж№ҙйҸӢеӢ«зј“
# й–®г„§и®ІйҚӣжҲ’жҠӨ: curl -fsSL https://raw.githubusercontent.com/larlarua/AutoCVE/v1.0.2/docker-compose.prod.yml | docker compose -f - up -d

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=autocve
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - autocve-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autocve-network

  backend:
    image: ghcr.io/larlarua/autocve-backend:v1.0.2
    restart: unless-stopped
    cpus: "1.0"
    mem_limit: 1g
    volumes:
      - backend_uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/autocve
      - REDIS_URL=redis://redis:6379/0
      - AGENT_ENABLED=true
      - AGENT_TASK_EXECUTION_MODE=worker
      - AGENT_WORKER_CONCURRENCY=${AGENT_WORKER_CONCURRENCY:-2}
      - AGENT_WORKER_JOB_TIMEOUT_SECONDS=${AGENT_WORKER_JOB_TIMEOUT_SECONDS:-1800}
      - AGENT_WORKER_MAX_TRIES=${AGENT_WORKER_MAX_TRIES:-2}
      - AGENT_EVENT_STREAM_ENABLED=true
      - ONE_CLICK_CVE_EXECUTION_MODE=worker
      - ONE_CLICK_CVE_MAX_REPOSITORY_SIZE_KB=${ONE_CLICK_CVE_MAX_REPOSITORY_SIZE_KB:-512000}
      - SANDBOX_ENABLED=true
      - SANDBOX_IMAGE=ghcr.io/larlarua/autocve-sandbox:v1.0.2
      # LLM й–°е¶Үз–Ҷ - з’Үй”ӢзүҙйҺ№оҮҖжё¶з‘•дҪ·ж…ЁйҸҖ?
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_API_KEY=${LLM_API_KEY:-your-api-key-here}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      # з»ӮдҪәж•Өжө пҪҮжӮҠ - и№Үе‘ҙгҖҸйҚҡеұҫжӨӮз’Ғеү§з–Ҷжҫ¶Сғзҡ¬йҚҗж¬ҸеҪүй–І?
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - all_proxy=
      - ALL_PROXY=
      - NO_PROXY=*
      - no_proxy=*
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - autocve-network

  # йҸҒзүҲеөҒжҗҙж’№зёјз»үз»ҳж№ҮйҚ”?- йҚҰг„ҘжӮ—з»”оҲҡжғҺйҚ”г„Ҙеў й‘·оҒ„е§©йҺөСҶо”‘
  agent-worker:
    image: ghcr.io/larlarua/autocve-backend:v1.0.2
    restart: unless-stopped
    cpus: "2.0"
    mem_limit: 4g
    volumes:
      - backend_uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/autocve
      - REDIS_URL=redis://redis:6379/0
      - AGENT_ENABLED=true
      - AGENT_TASK_EXECUTION_MODE=worker
      - AGENT_WORKER_CONCURRENCY=${AGENT_WORKER_CONCURRENCY:-2}
      - AGENT_WORKER_JOB_TIMEOUT_SECONDS=${AGENT_WORKER_JOB_TIMEOUT_SECONDS:-1800}
      - AGENT_WORKER_MAX_TRIES=${AGENT_WORKER_MAX_TRIES:-2}
      - AGENT_EVENT_STREAM_ENABLED=true
      - ONE_CLICK_CVE_EXECUTION_MODE=worker
      - SANDBOX_ENABLED=true
      - SANDBOX_IMAGE=ghcr.io/larlarua/autocve-sandbox:v1.0.2
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_API_KEY=${LLM_API_KEY:-your-api-key-here}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - all_proxy=
      - ALL_PROXY=
      - NO_PROXY=*
      - no_proxy=*
    command: ["/app/.venv/bin/python", "-m", "arq", "app.worker.agent_worker.WorkerSettings"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - autocve-network

  one-click-cve-worker:
    image: ghcr.io/larlarua/autocve-backend:v1.0.2
    restart: unless-stopped
    cpus: "1.0"
    mem_limit: 2g
    volumes:
      - backend_uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/autocve
      - REDIS_URL=redis://redis:6379/0
      - AGENT_ENABLED=true
      - AGENT_TASK_EXECUTION_MODE=worker
      - AGENT_EVENT_STREAM_ENABLED=true
      - ONE_CLICK_CVE_EXECUTION_MODE=worker
      - ONE_CLICK_CVE_MAX_REPOSITORY_SIZE_KB=${ONE_CLICK_CVE_MAX_REPOSITORY_SIZE_KB:-512000}
      - ONE_CLICK_CVE_WORKER_CONCURRENCY=${ONE_CLICK_CVE_WORKER_CONCURRENCY:-1}
      - ONE_CLICK_CVE_WORKER_JOB_TIMEOUT_SECONDS=${ONE_CLICK_CVE_WORKER_JOB_TIMEOUT_SECONDS:-7200}
      - ONE_CLICK_CVE_WORKER_MAX_TRIES=${ONE_CLICK_CVE_WORKER_MAX_TRIES:-1}
      - SANDBOX_ENABLED=true
      - SANDBOX_IMAGE=ghcr.io/larlarua/autocve-sandbox:v1.0.2
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_API_KEY=${LLM_API_KEY:-your-api-key-here}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - all_proxy=
      - ALL_PROXY=
      - NO_PROXY=*
      - no_proxy=*
    command: ["/app/.venv/bin/python", "-m", "arq", "app.worker.one_click_cve_worker.WorkerSettings"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - autocve-network

  db-migrate:
    image: ghcr.io/larlarua/autocve-backend:v1.0.2
    restart: "no"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/autocve
    command: ["/app/.venv/bin/alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - autocve-network

  frontend:
    image: ghcr.io/larlarua/autocve-frontend:v1.0.2
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      # з»ӮдҪәж•Өжө пҪҮжӮҠ - nginx й—ҮвӮ¬з‘•дҪәжҙҝжқ©зӮІжӮ—з»”?
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=*
    depends_on:
      - backend
    networks:
      - autocve-network

  # жЈ°еӢ¬еӘәйҚҷж Ёзҹҷз» йҒҚжҡ…йҚҚеҝҘзҙҷйҚҡеәЈоҒ¬жөјж°ӯеҜңй—ҮвӮ¬з’ӢеҶӘж•Өй”ӣ?
  sandbox-pull:
    image: ghcr.io/larlarua/autocve-sandbox:v1.0.2
    restart: "no"
    command: echo "Sandbox image ready"

networks:
  autocve-network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads:
  redis_data:
