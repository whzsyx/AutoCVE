# =============================================
# AutoCVE Docker Compose 端口覆盖配置
# =============================================
# 使用高端口避免冲突
# 部署: docker compose up -d

services:
  db:
    ports: !override
      - "15432:5432"

  redis:
    ports: !override
      - "16379:6379"

  backend:
    ports: !override
      - "18000:8000"

  frontend:
    ports: !override
      - "13000:80"

  adminer:
    ports: !override
      - "18080:8080"
