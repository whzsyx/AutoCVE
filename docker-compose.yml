services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ${POSTGRES_DB_NAME:-auditai}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - auditai-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auditai-network

  backend:
    build:
      context: ./backend
      args:
        http_proxy: ''
        https_proxy: ''
        HTTP_PROXY: ''
        HTTPS_PROXY: ''
        all_proxy: ''
        ALL_PROXY: ''
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/${POSTGRES_DB_NAME:-auditai}
      REDIS_URL: redis://redis:6379/0
      AGENT_ENABLED: 'true'
      SANDBOX_ENABLED: 'true'
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-auditai-sandbox:latest}
      HOST_PROJECT_ROOT: ${HOST_PROJECT_ROOT:-}
      HTTP_PROXY: ''
      HTTPS_PROXY: ''
      http_proxy: ''
      https_proxy: ''
      NO_PROXY: '*'
    command: sh -c ".venv/bin/alembic upgrade head && .venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '8000:8000'
    volumes:
      - backend_uploads:/app/uploads
      - ./skill_library:/app/skill_library
      - ./report_template_library:/app/report_template_library
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - auditai-network

  frontend:
    build:
      context: ./frontend
      args:
        http_proxy: ''
        https_proxy: ''
        HTTP_PROXY: ''
        HTTPS_PROXY: ''
        all_proxy: ''
        ALL_PROXY: ''
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_HOST_PROJECT_ROOT: ${VITE_HOST_PROJECT_ROOT:-}
      HTTP_PROXY: ''
      HTTPS_PROXY: ''
      http_proxy: ''
      https_proxy: ''
      NO_PROXY: '*'
    depends_on:
      - backend
    ports:
      - '3000:80'
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - auditai-network

  sandbox:
    build:
      context: ./docker/sandbox
    image: auditai-sandbox:latest
    restart: 'no'
    command: echo 'Sandbox image ready'

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - auditai-network

networks:
  auditai-network:
    driver: bridge

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-auditai_postgres_data}
  redis_data:
    name: ${REDIS_VOLUME_NAME:-auditai_redis_data}
  backend_uploads:
    name: ${BACKEND_UPLOADS_VOLUME_NAME:-auditai_backend_uploads}
